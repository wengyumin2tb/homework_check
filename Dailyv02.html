<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>資訊看板與待辦事項</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        height: 100vh;
        background: #f5f5f5;
        font-family: "Microsoft JhengHei", sans-serif;
    }

    .container {
        display: grid;
        grid-template-columns: 2fr 1fr;
        /* 將列高比例改為 3fr 和 4fr (即 3/7 和 4/7) */
        grid-template-rows: 3fr 4fr;
        gap: 15px;
        height: 100vh;
        padding: 15px;
    }

    .left {
        grid-row: 1 / span 2;
        background: #fff;
        border-radius: 12px;
        overflow: hidden;
        box-shadow: 0 4px 12px rgba(0,0,0,.08);
    }

    .right-top,
    .right-bottom {
        background: #fff;
        border-radius: 12px;
        overflow: hidden;
        box-shadow: 0 4px 12px rgba(0,0,0,.08);
    }

    iframe {
        width: 100%;
        height: 100%;
        border: none;
    }

    /* --- 常用連結區塊樣式 (改建為右上角區塊) --- */
    .right-top {
        display: flex;
        flex-direction: column;
        background: #fafafa;
    }

    .link-header {
        padding: 10px 15px; /* 縮小頭部區塊內邊距 */
        background: #fff;
        border-bottom: 1px solid #eee;
    }

    .link-header h2 {
        font-size: 1.1rem; /* 稍微縮小標題 */
        color: #333;
    }

    .link-input-group {
        display: flex;
        gap: 8px;
        margin-top: 8px;
    }

    .link-input-group input {
        padding: 6px 10px; /* 縮小輸入框高度 */
        border: 1px solid #ccc;
        border-radius: 4px;
        font-size: 13px;
        outline: none;
        transition: border-color 0.3s;
    }

    .link-input-group input:focus {
        border-color: #1976d2;
    }

    #link-name-input {
        width: 30%;
    }

    #link-url-input {
        flex: 1;
    }

    #add-link-btn {
        padding: 6px 12px; /* 縮小按鈕 */
        background: #1976d2;
        color: white;
        border: none;
        border-radius: 4px;
        font-size: 13px;
        cursor: pointer;
        transition: background 0.3s ease;
        white-space: nowrap;
    }

    #add-link-btn:hover {
        background: #0d47a1;
    }

    .link-list-container {
        flex: 1;
        overflow-y: auto;
        padding: 10px 15px;
    }

    #link-list {
        list-style: none;
    }

    .link-item {
        display: flex;
        justify-content: space-between;
        align-items: center;
        background: #fff;
        padding: 4px 8px; /* 縮小連結項目的內邊距 */
        margin-bottom: 4px; /* 縮小項目間的距離 */
        border-radius: 6px;
        box-shadow: 0 1px 3px rgba(0,0,0,.05);
        transition: all 0.2s ease;
    }

    .link-item:hover {
        transform: translateY(-1px);
        box-shadow: 0 2px 6px rgba(0,0,0,.1);
    }

    .link-anchor {
        font-size: 13px; /* 縮小連結文字 */
        color: #1976d2;
        text-decoration: none;
        flex: 1;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        margin-right: 10px;
    }

    .link-anchor:hover {
        text-decoration: underline;
    }

    /* --- 待辦事項區塊樣式 (右下) --- */
    .right-bottom {
        display: flex;
        flex-direction: column;
        background: #fafafa;
    }

    .todo-header {
        padding: 10px 15px; /* 縮小頭部區塊內邊距 */
        background: #fff;
        border-bottom: 1px solid #eee;
    }

    .todo-header h2 {
        color: #333;
        margin-bottom: 8px; /* 縮小標題下方距離 */
        font-size: 1.2rem; /* 稍微縮小標題 */
    }

    .todo-input-group {
        display: flex;
        gap: 8px;
    }

    #todo-input {
        flex: 1;
        padding: 8px 12px; /* 縮小輸入框高度 */
        border: 1px solid #ccc;
        border-radius: 6px;
        font-size: 14px; /* 縮小輸入框文字 */
        outline: none;
        transition: border-color 0.3s;
    }

    #todo-input:focus {
        border-color: #1976d2;
    }

    #add-todo-btn {
        padding: 8px 15px; /* 縮小按鈕 */
        background: #4caf50;
        color: white;
        border: none;
        border-radius: 6px;
        font-size: 14px;
        cursor: pointer;
        transition: background 0.3s ease;
    }

    #add-todo-btn:hover {
        background: #388e3c;
    }

    .todo-list-container {
        flex: 1;
        overflow-y: auto;
        padding: 10px 15px; /* 稍微縮小容器內邊距 */
    }

    #todo-list {
        list-style: none;
    }

    .todo-item {
        display: flex;
        justify-content: space-between;
        align-items: center;
        background: #fff;
        padding: 4px 8px; /* 縮小待辦事項的內邊距 */
        margin-bottom: 4px; /* 縮小項目間的距離 */
        border-radius: 6px; 
        box-shadow: 0 1px 3px rgba(0,0,0,.05); 
        cursor: pointer;
        transition: all 0.2s ease;
    }

    .todo-item:hover {
        transform: translateY(-1px); 
        box-shadow: 0 2px 6px rgba(0,0,0,.1);
    }

    .todo-text {
        font-size: 14px; /* 縮小待辦文字大小 */
        color: #333;
        flex: 1;
        word-break: break-all;
        transition: color 0.3s, text-decoration 0.3s;
        padding: 2px 0; /* 縮小文字本身的內邊距 */
    }

    .todo-item.completed .todo-text {
        text-decoration: line-through;
        color: #999;
    }

    /* 共用的刪除按鈕樣式 */
    .delete-btn {
        background: #ff5252;
        color: white;
        border: none;
        padding: 2px 8px; /* 縮小刪除按鈕尺寸 */
        border-radius: 4px;
        cursor: pointer;
        font-size: 12px; /* 縮小按鈕文字 */
        margin-left: 8px;
        transition: background 0.3s;
    }

    .delete-btn:hover {
        background: #d32f2f;
    }

    /* 捲軸美化 */
    ::-webkit-scrollbar {
        width: 6px; /* 讓捲軸稍微變細一點 */
    }
    ::-webkit-scrollbar-track {
        background: #f1f1f1; 
    }
    ::-webkit-scrollbar-thumb {
        background: #c1c1c1; 
        border-radius: 4px;
    }
    ::-webkit-scrollbar-thumb:hover {
        background: #a8a8a8; 
    }
</style>
</head>
<body>

<div class="container">

    <!-- 左側：文化部活動 -->
    <div class="left">
        <iframe
            src="https://event.moc.gov.tw/mp.asp?mp=1"
            title="文化部藝文活動">
        </iframe>
    </div>

    <!-- 右上 (佔 3/7)：常用連結區 -->
    <div class="right-top">
        <div class="link-header">
            <h2>🔗 常用連結</h2>
            <div class="link-input-group">
                <input type="text" id="link-name-input" placeholder="名稱">
                <input type="text" id="link-url-input" placeholder="網址 (含 https://)">
                <button id="add-link-btn">新增</button>
            </div>
        </div>
        <div class="link-list-container">
            <ul id="link-list">
                <!-- 連結項目將由 LocalStorage 載入 -->
            </ul>
        </div>
    </div>

    <!-- 右下 (佔 4/7)：待辦事項 -->
    <div class="right-bottom">
        <div class="todo-header">
            <h2>📝 待辦事項</h2>
            <div class="todo-input-group">
                <input type="text" id="todo-input" placeholder="請輸入新的待辦事項...">
                <button id="add-todo-btn">新增</button>
            </div>
        </div>
        <div class="todo-list-container">
            <ul id="todo-list">
                <!-- 待辦事項將由 LocalStorage 載入 -->
            </ul>
        </div>
    </div>

</div>

<script>
    /* =========================================
       待辦事項 (Todo List) 邏輯
       ========================================= */
    const todoInput = document.getElementById('todo-input');
    const addTodoBtn = document.getElementById('add-todo-btn');
    const todoList = document.getElementById('todo-list');

    const TODO_STORAGE_KEY = 'my_local_todos';
    let todos = [];

    function loadTodos() {
        const savedData = localStorage.getItem(TODO_STORAGE_KEY);
        if (savedData) {
            todos = JSON.parse(savedData);
        } else {
            todos = [];
        }
        renderAllTodos();
    }

    function saveTodos() {
        localStorage.setItem(TODO_STORAGE_KEY, JSON.stringify(todos));
    }

    function renderAllTodos() {
        todoList.innerHTML = '';
        todos.sort((a, b) => a.createdAt - b.createdAt);
        todos.forEach(todo => {
            renderTodoItem(todo);
        });
    }

    function handleAddTodo() {
        const text = todoInput.value.trim();
        if (text !== '') {
            todoInput.value = ''; 
            
            const newTodo = {
                id: 'todo-' + Date.now(),
                text: text,
                completed: false,
                createdAt: Date.now()
            };
            
            todos.push(newTodo);
            saveTodos(); 
            renderTodoItem(newTodo); 
        }
    }

    function renderTodoItem(todo) {
        const li = document.createElement('li');
        li.className = 'todo-item';
        if (todo.completed) {
            li.classList.add('completed');
        }

        const span = document.createElement('span');
        span.className = 'todo-text';
        span.textContent = todo.text;

        const deleteBtn = document.createElement('button');
        deleteBtn.className = 'delete-btn';
        deleteBtn.textContent = '刪除';

        li.appendChild(span);
        li.appendChild(deleteBtn);
        todoList.appendChild(li);

        li.addEventListener('click', function(e) {
            if (e.target !== deleteBtn) {
                todo.completed = !todo.completed;
                saveTodos(); 
                li.classList.toggle('completed'); 
            }
        });

        deleteBtn.addEventListener('click', function() {
            todos = todos.filter(t => t.id !== todo.id);
            saveTodos(); 
            li.remove(); 
        });
    }

    addTodoBtn.addEventListener('click', handleAddTodo);

    todoInput.addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
            handleAddTodo();
        }
    });

    /* =========================================
       常用連結 (Link List) 邏輯
       ========================================= */
    const linkNameInput = document.getElementById('link-name-input');
    const linkUrlInput = document.getElementById('link-url-input');
    const addLinkBtn = document.getElementById('add-link-btn');
    const linkList = document.getElementById('link-list');

    const LINK_STORAGE_KEY = 'my_local_links';
    let links = [];

    // 設定預設的兩個連結資料
    const defaultLinks = [
        { id: 'link-default-1', name: '博客來66折', url: 'https://activity.books.com.tw/books66?loc=P_books66_home_001', createdAt: 1 },
        { id: 'link-default-2', name: '台南新聞', url: 'https://www.cdns.com.tw/index/tainan_tc', createdAt: 2 }
    ];

    function loadLinks() {
        const savedData = localStorage.getItem(LINK_STORAGE_KEY);
        if (savedData) {
            links = JSON.parse(savedData);
        } else {
            // 初次載入時注入預設連結
            links = [...defaultLinks];
            saveLinks();
        }
        renderAllLinks();
    }

    function saveLinks() {
        localStorage.setItem(LINK_STORAGE_KEY, JSON.stringify(links));
    }

    function renderAllLinks() {
        linkList.innerHTML = '';
        links.sort((a, b) => a.createdAt - b.createdAt);
        links.forEach(link => {
            renderLinkItem(link);
        });
    }

    function handleAddLink() {
        const name = linkNameInput.value.trim();
        let url = linkUrlInput.value.trim();
        
        // 簡易檢查欄位是否有填寫
        if (name !== '' && url !== '') {
            // 自動補齊 https:// 如果使用者忘記輸入
            if (!url.startsWith('http://') && !url.startsWith('https://')) {
                url = 'https://' + url;
            }
            
            linkNameInput.value = '';
            linkUrlInput.value = '';
            
            const newLink = {
                id: 'link-' + Date.now(),
                name: name,
                url: url,
                createdAt: Date.now()
            };
            
            links.push(newLink);
            saveLinks();
            renderLinkItem(newLink);
        } else {
            // 若未填寫則更改 placeholder 以做為簡單提示
            linkNameInput.placeholder = "請輸入名稱!";
            linkUrlInput.placeholder = "請輸入網址!";
            setTimeout(() => {
                linkNameInput.placeholder = "名稱";
                linkUrlInput.placeholder = "網址 (含 https://)";
            }, 2000);
        }
    }

    function renderLinkItem(link) {
        const li = document.createElement('li');
        li.className = 'link-item';

        const a = document.createElement('a');
        a.className = 'link-anchor';
        a.href = link.url;
        a.target = '_blank'; // 設定為新視窗開啟
        a.textContent = link.name;
        a.title = link.url; // 滑鼠懸浮時可以顯示完整網址

        const deleteBtn = document.createElement('button');
        deleteBtn.className = 'delete-btn';
        deleteBtn.textContent = '刪除';

        li.appendChild(a);
        li.appendChild(deleteBtn);
        linkList.appendChild(li);

        deleteBtn.addEventListener('click', function() {
            links = links.filter(l => l.id !== link.id);
            saveLinks();
            li.remove();
        });
    }

    // 綁定常用連結的事件
    addLinkBtn.addEventListener('click', handleAddLink);

    // 在名稱欄位按下 Enter 後，焦點切換至網址欄位
    linkNameInput.addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
            linkUrlInput.focus();
        }
    });

    // 在網址欄位按下 Enter 後，直接新增
    linkUrlInput.addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
            handleAddLink();
        }
    });

    // 網頁載入時執行初始化
    loadTodos();
    loadLinks();
</script>

</body>
</html>
